# theme.toml template for a Hugo theme
# See https://github.com/gohugoio/hugoThemes#themetoml for an example


name = "Starry"
description = "Starry Nights. Calm Reading."
license = "GPL-3.0"
licenselink = "https://github.com/meethigher/hugo-theme-starry/blob/main/LICENSE"
homepage = "https://github.com/meethigher/hugo-theme-starry"
demosite = "https://meethigher.github.io"
min_version = "0.154.0"

tags = ["blog", "personal", "light", "dark", "starry"]

features = [
    "card-style layout",
    "responsive design",
    "starry particle effect",
    "light/dark mode toggle",
    "table of contents",
    "lazy image loading",
    "image viewer",
    "mathJax lazy rendering",
    "indexeddb fast search",
    "gitalk comments integration",
    "open markdown in browser (dev mode)"
]

[author]
name = "meethigher"
homepage = "https://meethigher.top"
