{{ define "main" }}
<h1>{{ .Pages }}</h1>
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  {{ range (.Pages.ByDate.Reverse) }}
    <h2><a href="{{ .RelPermalink }}">{{ if eq .Params.state "top" }}[置顶] {{ end }}{{ if eq .Params.state "draft" }}[未完成] {{ end }}{{ .LinkTitle }}</a></h2>
    <p class="post-date">{{ .Date.Format "2006-01-02" }}</p>
    {{ .Summary }}
  {{ end }}
{{ end }}
