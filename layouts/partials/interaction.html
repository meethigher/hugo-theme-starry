<div class="interaction">
    <div class="toast toast-success" id="shareBtnToastSuccess">
        <span>{{ i18n "interaction.share.success" }}</span>
    </div>
    <div class="toast toast-error" id="shareBtnToastError">
        <span>{{ i18n "interaction.share.error" }}</span>
    </div>
    <div class="modal-overlay" id="rewardBtnModal">
        <div class="modal-content">
            <button class="modal-close">×</button>
            <div class="modal-title">{{ i18n "interaction.reward.title" }}</div>
            <div class="model-subtitle">{{ i18n "interaction.reward.subtitle" }}</div>
            <img src="{{ "reward.jpg" | relURL }}" class="qrcode">
            <div class="modal-note">{{ i18n "interaction.reward.note" }}</div>
        </div>
    </div>
</div>
