<!-- 侧边工具栏 -->
<aside class="sidebar-tools" id="sidebarTools">
    <button class="tool-btn" id="scrollToTop" aria-label="{{ i18n "scroll_to_top" }}">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <title>{{ i18n "scroll_to_top" }}</title>
            <path d="M18 15l-6-6-6 6"/>

            <title>{{ i18n "scroll_to_bottom" }}</title>
            <path d="M6 9l6 6 6-6"/>
        </svg>
    </button>
