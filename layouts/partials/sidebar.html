<!-- 侧边工具栏 -->
<div class="sidebar-tools" id="sidebarTools">
    <button class="tool-btn" id="searchBtn" aria-label="{{ i18n "search_button" }}">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <title>{{ i18n "search_button" }}</title>
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
        </svg>
    </button>
    <button class="tool-btn" id="themeToggle" aria-label="{{ i18n "theme.toggle" }}">
        <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <title>{{ i18n "theme.sun" }}</title>
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <title>{{ i18n "theme.moon" }}</title>
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>
    <button class="tool-btn" id="scrollToTop" aria-label="{{ i18n "scroll_to_top" }}">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <title>{{ i18n "scroll_to_top" }}</title>
            <path d="M18 15l-6-6-6 6"/>
        </svg>
    </button>
    <button class="tool-btn" id="scrollToBottom" aria-label="{{ i18n "scroll_to_bottom" }}">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <title>{{ i18n "scroll_to_bottom" }}</title>
            <path d="M6 9l6 6 6-6"/>
        </svg>
    </button>
    <button class="tool-btn" id="toolMenuSwitcher" aria-expanded="true" aria-label="{{ i18n "tool_menu.switcher" }}">
        <svg class="expand-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>{{ i18n "tool_menu.expand" }}</title>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
        <svg class="collapse-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <title>{{ i18n "tool_menu.collapse" }}</title>
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
    </button>
</div>
