# 自定义参数
params:
  # seo meta keywords
  seoTags:
    - meethigher
    - 个人网站
    - 个人博客
    - 生活
    - 程序员
# 以下为 hugo 内置参数，参阅文档 https://gohugo.io/getting-started/configuration/#all-configuration-settings
title: 站点名称
baseURL: https://meethigher.top/blog/
# 控制 html lang 以及 i18n
languageCode: zh-CN
# 默认值为false，可省略。若为true，则使用丑陋url。丑陋url:/index.html，美观url: /index/
# 该内容会影响到相对路径静态资源的加载, 故不建议修改。
uglyURLs: false
# 禁用hugo的generator的meta注入
disableHugoGeneratorInject: true
minify:
  # false 为原始格式输出，true 为 html 压缩输出
  minifyOutput: false
# 分页设置
pagination:
  pagerSize: 2
  path: page
outputs:
  home:
    - html
    - json
permalinks:
  # 设置文章的链接
  archives: /:year/:contentbasename/
  # 每页的格式
  page: /page/:contentbasename/
menus:
  main:
    - name: 主页
      pageRef: /
      weight: 10
    - name: 归档
      pageRef: /archives
      weight: 30
    - name: 标签
      # 该路径在程序中是写死的，不建议修改
      pageRef: /tags
      weight: 20
    - name: 关于
      pageRef: /about
      weight: 40
markup:
  goldmark:
    extensions:
      # false 表示关闭智能排版（自动把 -- 变成 –，... 变成 …，英文引号变成中文引号等）
      typographer: false
# 开发主题时，注释该行
# theme: starry
module:
  hugoVersion:
    extended: true
    min: 0.154.5
