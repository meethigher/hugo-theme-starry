# 自定义参数
params:
  # 背景 starry 配置
  starry:
    # true 表示启用背景 starry
    varStarryEnable: true
    # 配置 star 数量
    varStarCount: 50
    # true 表示启用 a 标签跳转时展示进度条
    varProgressEnable: true
  # seo meta keywords
  seoTags:
    - meethigher
    - 个人网站
    - 个人博客
    - 生活
    - 程序员
# 以下为 hugo 内置参数，参阅文档 https://gohugo.io/getting-started/configuration/#all-configuration-settings
title: 站点名称
baseURL: https://meethigher.top/blog/
# 控制 html lang 以及 i18n
languageCode: zh-CN
# 默认值为 false，可省略。若为 true，则使用丑陋 url。丑陋 url:/index.html，美观 url: /index/
# 该内容会影响到相对路径静态资源的加载, 故不建议修改。
uglyURLs: false
# 禁用 hugo 的 generator 的 meta 注入
disableHugoGeneratorInject: true
minify:
  # false 为原始格式输出，true 为 html 压缩输出
  minifyOutput: false
# 分页设置
pagination:
  pagerSize: 2
  path: page
outputs:
  home:
    - html
    - json
permalinks:
  # 设置文章的链接
  archives: /:year/:contentbasename/
  # 每页的格式
  page: /page/:contentbasename/
menus:
  main:
    - name: 主页
      pageRef: /
      weight: 10
    - name: 归档
      pageRef: /archives
      weight: 30
    - name: 标签
      # 该路径在程序中是写死的，不建议修改
      pageRef: /tags
      weight: 20
    - name: 关于
      pageRef: /about
      weight: 40
markup:
  # 禁用 hugo 的内置语法高亮器 https://gohugo.io/content-management/syntax-highlighting/
  highlight:
    # 代码高亮
    codeFences: true
    # true 表示使用内联样式。false 表示使用 css 类名
    noClasses: false
    # 展示行号
    lineNos: true
    # false 表示关闭语言自动检测
    guessSyntax: false
  goldmark:
    renderer:
      # 允许渲染 markdown 中的 script
      unsafe: true
    extensions:
      # false 表示关闭智能排版（自动把 -- 变成 –，... 变成 …，英文引号变成中文引号等）
      typographer: false
# 开发主题时，注释该行
# theme: starry
module:
  hugoVersion:
    extended: true
    min: 0.154.5
