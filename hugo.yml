# 参阅文档 https://gohugo.io/getting-started/configuration/#all-configuration-settings
baseURL: https://meethigher.top/blog/
languageCode: zh-CN
title: 站点名称
# 默认值为false，可省略。若为true，则使用丑陋url。丑陋url:/index.html，美观url: /index/
# 该内容会影响到相对路径静态资源的加载, 故不建议修改。直接省略即可
uglyURLs: false
# 禁用hugo的generator的meta注入
disableHugoGeneratorInject: true
minify: false
## 分页参数
#pagination:
#  disableAliases: false
#  pagerSize: 2
#  path: page
# 指定首页的输出格式为html/json。除了首页home，还有内容section、标签term、单独页page
outputs:
  home:
    - html
    - json
# 自定义参数
params:
  seoTags:
    - meethigher
    - 个人网站
    - 个人博客
    - 生活
    - 程序员
permalinks:
  # 每篇文章的格式
  archives: /:year/:filename/
  # 每页的格式
  page: /page/:filename/
menus:
  main:
    - name: 主页
      pageRef: /
      weight: 10
    - name: 归档
      pageRef: /archives
      weight: 30
    - name: 标签
      pageRef: /tags
      weight: 20
    - name: 关于
      pageRef: /about
      weight: 40
# 开发主题时，注释该行
# theme: starry
module:
  hugoVersion:
    extended: false
    min: 0.116.0
