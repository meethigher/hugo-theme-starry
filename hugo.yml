# ================================
# 自定义主题参数
# ================================
params:
  # 开发模式下，会在文章标题显示 Dev 按钮，点击可通过该服务快速打开 markdown 文件
  # 配套实现：https://github.com/meethigher/hfopener
  debug: false
  debugServer: http://127.0.0.1:13131
  # 站点地址
  logoSite: "https://meethigher.top"
  # 站点左上角主标题
  logoTitle: "Hugo-Theme-Starry"
  # 站点副标题（支持较长文本描述）
  logoSubTitle: "The night sky hides all the light away, leaving only the stars to think of you again and again in the darkness."
  starry:
    # 是否启用粒子星空背景（true 启用 / false 关闭）
    varStarBgEnable: true

    # 粒子（星星）数量，仅在启用星空背景时生效
    varStarCount: 50

    # 是否在点击 a 标签跳转时显示顶部加载进度条
    varProgressEnable: true

    # 是否默认展开右侧工具栏
    varToolExpanded: false

    # 网站起始运行时间（用于展示运行时长）
    # 格式："yyyy/MM/dd HH:mm:ss"
    # 若留空，则默认使用 "2019/09/15 19:57:09"
    varSiteBegin: "2019/09/15 19:57:09"

    # 是否启用站点统计服务
    # 配套实现：https://github.com/meethigher/count-for-page
    varStatsServiceEnable: false

    # 统计服务接口地址（启用统计服务时生效）
    varStatsServiceUrl: https://meethigher.top/census/count

    # 搜索索引 indexdb 缓存时效期，单位毫秒
    varCacheExpire: 43200000

    # Gitalk 评论系统配置
    # 使用说明：https://github.com/gitalk/gitalk/blob/master/readme-cn.md
    varGitalk:
      # 是否启用 Gitalk（开发环境可设为 true，生产环境改为 false）
      dev: true
      clientId: "e46f6dec7c07145c652c"
      clientSecret: "d1a0b627f9b76d21bd3080d1777d0aa0ad55dd83"
      accessToken: "6a2f4d91a1f188a2089e70c2a7b63628f3e9e664"
      repo: "gitalk"
      owner: "gitalk"
      admin:
        - "booxood"
        - "mamborer"

  # SEO 关键词（用于 meta keywords）
  seoTags:
    - hugo
    - blog
    - developer
    - programmer
    - life


# ================================
# Hugo 内置参数
# 官方文档：https://gohugo.io/getting-started/configuration/#all-configuration-settings
# ================================

# 站点标题（展示在网页 title 中的内容）
title: "Hugo-Theme-Starry"

# 站点基础 URL（生产环境请务必填写正确）
baseURL: https://meethigher.top/blog/

# HTML lang 属性及 i18n 语言设置
languageCode: en

# 是否使用丑陋 URL
# false：美观 URL（/index/）
# true ：丑陋 URL（/index.html）
# 注意：该设置会影响静态资源相对路径，建议直接使用 false
uglyURLs: false

# 禁用 Hugo 自动注入 generator meta 标签
disableHugoGeneratorInject: true

minify:
  # 是否压缩 HTML 输出
  # true  启用压缩
  # false 原始格式输出（便于调试）
  minifyOutput: true

# ================================
# 分页配置
# ================================
pagination:
  # 每页文章数量
  pagerSize: 4
  # 分页路径，例如 /page/2
  path: page

# 首页输出格式
outputs:
  home:
    - html
    - json

permalinks:
  # archives 类型页面 URL 规则
  # 示例：/2024/article-name/
  archives: /:year/:contentbasename/

# ================================
# 菜单配置
# ================================
menus:
  main:
    - name: Home
      pageRef: /
      weight: 10

    - name: Tags
      pageRef: /tags
      weight: 20

    - name: Categories
      pageRef: /categories
      weight: 19

    # 以下为自定义页面（pageRef 对应内容目录或文件名）
    - name: Archives
      pageRef: /archives
      weight: 30

    - name: About
      pageRef: /about
      weight: 40


# ================================
# Markdown 渲染与代码高亮配置
# ================================
markup:
  tableOfContents:
    # 自动生成目录的标题层级范围 [startLevel, endLevel]
    startLevel: 1
    endLevel: 6

  highlight:
    # 是否启用代码块高亮
    codeFences: true

    # true  使用内联样式
    # false 使用 CSS 类名（推荐，便于主题统一控制）
    # 本主题只支持 false
    noClasses: false

    # 是否显示行号
    lineNos: true

    # 是否开启语言自动检测
    guessSyntax: false

  goldmark:
    renderer:
      # 是否允许 Markdown 中渲染原始 HTML / script
      unsafe: true

    extensions:
      # 是否启用智能排版（-- → –，... → … 等）
      # false 表示关闭
      typographer: false


# 开发主题时请注释该行
# theme: starry

module:
  hugoVersion:
    # 是否使用 Hugo Extended 版本（支持 SCSS）
    extended: true

    # 允许的 Hugo 版本范围
    min: 0.154.0
    max: 0.156.5