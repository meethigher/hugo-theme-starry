# 自定义参数
params:
  logoTitle: "hugo-theme-starry"
  logoSubTitle: "夜空把所有的光都藏了起来，只留下星星，在黑暗里一遍一遍地想你"
  starry:
    # true 表示启用背景 starry
    varStarryEnable: true
    # 配置 star 数量
    varStarCount: 50
    # true 表示启用 a 标签跳转时展示进度条
    varProgressEnable: true
    # true 表示默认侧边栏展开
    varToolExpanded: false
    # 网站开始运行的时间，格式"yyyy/MM/dd HH:mm:ss"，不填写，默认时间为"2019/09/15 19:57:09"
    varSiteBegin: "2019/09/15 19:57:09"
    # 网站统计服务，参考实现 https://github.com/meethigher/count-for-page
    varStatsServiceEnable: true
    varStatsServiceUrl: https://meethigher.top/census/count
  # seo meta keywords
  seoTags:
    - hugo
    - starry
    - blog
    - card
    - responsive
    - light
    - dark
# 以下为 hugo 内置参数，参阅文档 https://gohugo.io/getting-started/configuration/#all-configuration-settings
title: "hugo-theme-starry"
baseURL: https://meethigher.top/blog/
# 控制 html lang 以及 i18n
languageCode: zh-CN
# 默认值为 false，可省略。若为 true，则使用丑陋 url。丑陋 url:/index.html，美观 url: /index/
# 该内容会影响到相对路径静态资源的加载, 故不建议修改。
uglyURLs: false
# 禁用 hugo 的 generator 的 meta 注入
disableHugoGeneratorInject: true
minify:
  # false 为原始格式输出，true 为 html 压缩输出
  minifyOutput: true
# 分页设置
pagination:
  pagerSize: 2
  path: page
outputs:
  home:
    - html
    - json
permalinks:
  # 设置文章的链接
  archives: /:year/:contentbasename/
  # 每页的格式
  page: /page/:contentbasename/
menus:
  main:
    - name: 首页
      pageRef: /
      weight: 10
    - name: 归档
      pageRef: /archives
      weight: 30
    - name: 标签
      # 该路径在程序中是写死的，不建议修改
      pageRef: /tags
      weight: 20
    - name: 关于
      pageRef: /about
      weight: 40
    - name: 关于1
      pageRef: /about
      weight: 40
    - name: 关于2
      pageRef: /about
      weight: 40
    - name: 关于3
      pageRef: /about
      weight: 40
    - name: 关于4
      pageRef: /about
      weight: 40
    - name: 关于5
      pageRef: /about
      weight: 40
    - name: 关于6
      pageRef: /about
      weight: 40
markup:
  # 生成目录 h 标签 level
  tableOfContents:
    startLevel: 1
    endLevel: 6
  # 禁用 hugo 的内置语法高亮器 https://gohugo.io/content-management/syntax-highlighting/
  # highlight 中的如下参数，在主题中不建议修改
  highlight:
    # 代码高亮
    codeFences: true
    # true 表示使用内联样式。false 表示使用 css 类名
    noClasses: false
    # 展示行号
    lineNos: false
    # false 表示关闭语言自动检测
    guessSyntax: false
  goldmark:
    renderer:
      # 允许渲染 markdown 中的 script
      unsafe: true
    extensions:
      # false 表示关闭智能排版（自动把 -- 变成 –，... 变成 …，英文引号变成中文引号等）
      typographer: false
# 开发主题时，注释该行
# theme: starry
module:
  hugoVersion:
    extended: true
    max: 0.154.5
    min: 0.154.5
