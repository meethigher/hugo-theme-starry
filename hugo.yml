# 参阅文档 https://gohugo.io/getting-started/configuration/#all-configuration-settings
baseURL: https://meethigher.top/
languageCode: zh-CN
title: Hello-World
# 默认值为false，可省略。若为true，则使用丑陋url。丑陋url:/index.html，美观url: /index/
# 该内容会影响到相对路径静态资源的加载, 故不建议修改。直接省略即可
uglyURLs: false
# 禁用hugo的generator的meta注入
disableHugoGeneratorInject: true
minify: true
# 指定首页的输出格式为html/json。除了首页home，还有内容section、标签term、单独页page
outputs:
  home:
    - html
    - json
permalinks:
  archives: /:year/:filename/
menus:
  main:
    - name: Home
      pageRef: /
      weight: 10
    - name: Archives
      pageRef: /archives
      weight: 30
    - name: Tags
      pageRef: /tags
      weight: 20
    - name: About
      pageRef: /about
      weight: 40
# 开发主题时，注释该行
# theme: starry
module:
  hugoVersion:
    extended: false
    min: 0.116.0
